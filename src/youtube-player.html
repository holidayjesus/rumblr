<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rumblr YouTube Player</title>
  <link rel="stylesheet" href="youtube-player.css" />
</head>
<body>
  <main class="player-shell">
    <div id="player" class="player-frame"></div>
    <section id="player-status" class="player-status">
      <strong>Loading YouTube</strong>
      <span>Preparing the embedded player.</span>
      <button id="watch-now" type="button">Open on YouTube</button>
    </section>
  </main>
  <script src="youtube-player.js" type="module"></script>
</body>
</html>
